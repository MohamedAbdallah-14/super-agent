name: Bug Report
description: Report a defect in the active SuperAgent surface
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, or inputs to reproduce the issue.
      placeholder: |
        1. Run `superagent ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened instead.
    validations:
      required: true
  - type: textarea
    id: doctor-output
    attributes:
      label: "`superagent doctor` output"
      description: Paste the output of `superagent doctor` if available.
      render: shell
    validations:
      required: false
  - type: dropdown
    id: host
    attributes:
      label: Host
      description: Which host are you using?
      options:
        - Claude Code
        - Codex CLI
        - Gemini CLI
        - Cursor
        - Other
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.11.0"
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating System
      description: Your OS and version (e.g., macOS 15.3, Ubuntu 24.04).
      placeholder: "macOS 15.3"
    validations:
      required: false
