# expertise/composition-map.yaml
# Single source of truth for module resolution per role per task
#
# Layers:
#   1. always  — baked into every agent invocation for that role
#   2. auto    — auto-composed from stack detection (applied to all stacks)
#   3. stacks  — per-stack modules resolved from detected project stacks
#   4. concerns — task-specific modules from declared concerns
#
# Role rules:
#   executor      → expertise modules (HOW to build) + antipatterns (what NOT to do)
#   designer      → design tooling modules (HOW to design) + design antipatterns
#   verifier      → antipatterns ONLY (what to detect) + testing modules
#   reviewer      → antipatterns ONLY (what to detect) + architecture + design (during spec-challenge)
#   content-author -> content foundations + i18n + editorial constraints
#
# All paths are relative to expertise/

always:
  executor:
    - antipatterns/process/ai-coding-antipatterns.md
    - antipatterns/code/error-handling-antipatterns.md
    - antipatterns/code/naming-and-abstraction.md
  verifier:
    - antipatterns/process/ai-coding-antipatterns.md
    - antipatterns/code/testing-antipatterns.md
    - antipatterns/code/state-management-antipatterns.md
    - quality/evidence-based-verification.md
  reviewer:
    - antipatterns/process/ai-coding-antipatterns.md
    - antipatterns/code/code-smells.md
    - antipatterns/process/code-review-antipatterns.md
    - antipatterns/code/dependency-antipatterns.md
    - architecture/foundations/architectural-thinking.md
    - architecture/foundations/coupling-and-cohesion.md
    - antipatterns/code/architecture-antipatterns.md
    - architecture/foundations/domain-driven-design.md
  content-author:
    - i18n/content/translation-management.md
    - i18n/foundations/string-externalization.md
    - i18n/foundations/pluralization-and-gender.md

auto:
  all-stacks:
    all-roles:
      - antipatterns/security/vulnerability-patterns.md
      - antipatterns/security/secrets-antipatterns.md
      - antipatterns/performance/performance-antipatterns.md
      - antipatterns/process/technical-debt-antipatterns.md

